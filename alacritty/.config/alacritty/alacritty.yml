env:
  TERM: alacritty
window:
  padding:
    x: 0
    y: 0
  decorations: none
  opacity: 1
cursor:
  style:
    shape: Block
    blinking: Off
live_config_reload: true
shell:
  program: /usr/bin/fish
font:
  normal:
    family: Iosevka Fixed
    style: Normal
  bold:
    family: Iosevka Fixed
    style: Bold
  italic:
    family: Iosevka Fixed
    style: Italic
  bold_italic:
    family: Iosevka Fixed
    style: Bold Italic
  size: 16
  offset:
    x: 0
    y: 1
colors:
  primary:
    background: "0x151515"
    foreground: "0xe0def4"
  cursor:
    text: "0x000000"
    cursor: "0xffffff"
  vi_mode_cursor:
    text: "0xe0def4"
    cursor: "0x524f67"
  line_indicator:
    foreground: None
    background: None
  selection:
    text: "0xe0def4"
    background: "0x403d52"
  normal:
    black: "0x26233a"
    red: "0xeb6f92"
    green: "0x31748f"
    yellow: "0xf6c177"
    blue: "0x9ccfd8"
    magenta: "0xc4a7e7"
    cyan: "0xebbcba"
    white: "0xe0def4"
  bright:
    black: "0x6e6a86"
    red: "0xeb6f92"
    green: "0x31748f"
    yellow: "0xf6c177"
    blue: "0x9ccfd8"
    magenta: "0xc4a7e7"
    cyan: "0xebbcba"
    white: "0xe0def4"
  hints:
    start:
      foreground: "#908caa"
      background: "#1f1d2e"
    end:
      foreground: "#6e6a86"
      background: "#1f1d2e"
