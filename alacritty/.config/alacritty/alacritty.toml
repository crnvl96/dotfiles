live_config_reload = true

[cursor.style]
blinking = "Off"
shape = "Block"

[env]
TERM = "alacritty"

[font]
size = 16

[font.offset]
x = 0
y = 1

[font.normal]
family = "IosevkaNerdFont"
style = "Normal"

[font.bold]
family = "IosevkaNerdFont"
style = "Extra Bold"

[font.italic]
family = "IosevkaNerdFont"
style = "Italic"

[font.bold_italic]
family = "IosevkaNerdFont"
style = "Extra Bold Italic"

[shell]
program = "/usr/bin/fish"

[window]
decorations = "none"
opacity = 0.92

[window.padding]
x = 0
y = 0

[colors.primary]
background = '#181616'
foreground = '#c5c9c5'

[colors.normal]
black = '#0d0c0c'
blue = '#8ba4b0'
cyan = '#8ea4a2'
green = '#8a9a7b'
magenta = '#a292a3'
red = '#c4746e'
white = '#C8C093'
yellow = '#c4b28a'

[colors.bright]
black = '#a6a69c'
blue = '#7FB4CA'
cyan = '#7AA89F'
green = '#87a987'
magenta = '#938AA9'
red = '#E46876'
white = '#c5c9c5'
yellow = '#E6C384'

[colors.selection]
background = '#2d4f67'
foreground = '#c8c093'

[[colors.indexed_colors]]
index = 16
color = '#ffa066'

[[colors.indexed_colors]]
index = 17
color = '#ff5d62'
