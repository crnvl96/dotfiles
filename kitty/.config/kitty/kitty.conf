font_family Berkeley Mono
font_size 13
modify_font cell_height 120%
modify_font cell_width 95%
modify_font underline_position 4
modify_font underline_thickness 150%

enabled_layouts splits

cursor_blink_interval 0
mouse_hide_wait 10.0
url_style double
enable_audio_bell no
confirm_os_window_close 0

tab_bar_edge top
tab_bar_margin_width 5
tab_bar_margin_height 5 0
tab_bar_style separator
tab_separator ""
tab_bar_min_tabs 2
tab_title_template "{fmt.fg._2d4059}{fmt.bg.default}|{fmt.fg._a3b18a}{fmt.bg._2d4059} ({index}) {tab.active_oldest_exe} {fmt.fg._2d4059}{fmt.bg.default}| "
active_tab_title_template "{fmt.fg._556b2f}{fmt.bg.default}|{fmt.fg.default}{fmt.bg._556b2f} ({index}) {tab.active_oldest_exe} {fmt.fg._556b2f}{fmt.bg.default}| "
active_tab_font_style bold

kitty_mod alt

map kitty_mod+t new_tab_with_cwd

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

map kitty_mod+1 goto_tab 1
map kitty_mod+2 goto_tab 2
map kitty_mod+3 goto_tab 3
map kitty_mod+4 goto_tab 4
map kitty_mod+5 goto_tab 5
map kitty_mod+6 goto_tab 6
map kitty_mod+7 goto_tab 7
map kitty_mod+8 goto_tab 8
map kitty_mod+9 goto_tab 9

map kitty_mod+k neighboring_window up
map kitty_mod+j neighboring_window down
map kitty_mod+h neighboring_window left
map kitty_mod+l neighboring_window right
map kitty_mod+s launch --location=hsplit
map kitty_mod+v launch --location=vsplit
map kitty_mod+q close_window

# Base16 Default Dark - kitty color config
