# vim:ft=kitty

# theme
# name: BATHORY colors for Kitty
# url: https://sw.kovidgoyal.net/kitty/conf.html
# upstream: ${upstream}
# author: Andrea Schiavini (original code by Casey Miller)

font_family Go Mono
font_size 13
modify_font cell_height 120%
modify_font cell_width 95%
modify_font underline_position 4
modify_font underline_thickness 150%

enabled_layouts splits

cursor_blink_interval 0
mouse_hide_wait 10.0
url_style double
enable_audio_bell no
confirm_os_window_close 0

tab_bar_edge top
tab_bar_margin_width 5
tab_bar_margin_height 5 0
tab_bar_style separator
tab_separator " | "
tab_bar_min_tabs 2

tab_title_template "{title}"
active_tab_title_template "{title}"

active_tab_font_style bold

kitty_mod alt+shift

map kitty_mod+t new_tab_with_cwd

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

map kitty_mod+k neighboring_window up
map kitty_mod+j neighboring_window down
map kitty_mod+h neighboring_window left
map kitty_mod+l neighboring_window right
map kitty_mod+r set_tab_title
map kitty_mod+s launch --location=hsplit --cwd=current
map kitty_mod+v launch --location=vsplit --cwd=current
map kitty_mod+q close_window

map kitty_mod+plus change_font_size all +2.0
map kitty_mod+minus change_font_size all -2.0

map kitty_mod+left resize_window narrower 20
map kitty_mod+right resize_window wider 20
map kitty_mod+up resize_window taller 5
map kitty_mod+down resize_window shorter 5

background #111113
foreground #c1c1c1
selection_background #333333
selection_foreground #c1c1c1
url_color #aaaaaa
cursor #c1c1c1
cursor_text_color #000000

# Tabs
active_tab_background #333333
active_tab_foreground #5f8787
inactive_tab_background #000000
inactive_tab_foreground #505050
#tab_bar_background #000000

# Windows
active_border_color #5f8787
inactive_border_color #505050

# normal
color0 #111113
color1 #5f8787
color2 #c1c1c1
color3 #888888
color4 #aaaaaa
color5 #999999
color6 #fbcb97
color7 #c1c1c1

# bright
color8 #505050
color9 #5f8787
color10 #c1c1c1
color11 #888888
color12 #aaaaaa
color13 #e78a43
color14 #fbcb97
color15 #c1c1c1

# extended colors
color16 #aaaaaa
color17 #5f8787
