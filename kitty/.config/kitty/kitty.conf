font_family      BerkeleyMono
bold_font        auto
italic_font      auto
bold_italic_font auto

term xterm-kitty
confirm_os_window_close 0

adjust_line_height 2

background_opacity 1
font_size 12.0
disable_ligatures never
cursor_shape block
cursor_blink_interval 0
enable_audio_bell no
draw_minimal_borders yes
window_margin_width 0
window_padding_width 0
hide_window_decorations yes

foreground #c5cdd9
background #2b2d37
color0     #363a49
color8     #363a49
color1     #ec7279
color9     #ec7279
color2     #a0c980
color10    #a0c980
color3     #deb974
color11    #deb974
color4     #6cb6eb
color12    #6cb6eb
color5     #d38aea
color13    #d38aea
color6     #5dbbc1
color14    #5dbbc1
color7     #c5cdd9
color15    #c5cdd9
