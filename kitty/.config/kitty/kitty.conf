font_size 12
font_family BerkeleyMono Nerd Font
bold_font BerkeleyMono Nerd Font Bold
italic_font BerkeleyMono Nerd Font Italic
bold_italic_font BerkeleyMono Nerd Font Bold Italic

# shell_integration no-cursor
confirm_os_window_close 0
enable_audio_bell no
hide_window_decorations yes

cursor_shape block
cursor_blink_interval 0

tab_bar_edge top
tab_bar_style slant

enabled_layouts splits:split_axis=horizontal

clear_all_shortcuts yes
clear_all_mouse_actions yes

map f5 load_config_file

# mouse related features
copy_on_select clipboard
mouse_map left press ungrabbed mouse_selection normal
mouse_map ctrl+left press ungrabbed mouse_selection rectangle
mouse_map left doublepress ungrabbed mouse_selection word
mouse_map left triplepress ungrabbed mouse_selection line
mouse_map ctrl+left triplepress ungrabbed mouse_selection line_from_point
mouse_map ctrl+right press ungrabbed mouse_selection extend
mouse_map right release ungrabbed paste_selection

# copy/paste
map ctrl+shift+v paste_from_clipboard

# Keyboard shortcuts.
kitty_mod alt+shift

map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0

map kitty_mod+t new_tab_with_cwd
map kitty_mod+r set_tab_title

# Move between tabs.
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

map kitty_mod+period next_tab
map kitty_mod+comma previous_tab

# Layout movement and settings.
map kitty_mod+k neighboring_window up
map kitty_mod+j neighboring_window down
map kitty_mod+h neighboring_window left
map kitty_mod+l neighboring_window right

map kitty_mod+c close_tab

map kitty_mod+s launch --location=hsplit --cwd=current
map kitty_mod+v launch --location=vsplit --cwd=current

# vim:ft=kitty

