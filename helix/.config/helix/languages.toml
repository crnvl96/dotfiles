[language-server.ruff]
command = "ruff"
args = ["server"]
cmd_env = { RUFF_TRACE = 'messages' }

[language-server.ruff.config.settings]
logLevel = "debug"


[language-server.basedpyright]
command = "basedpyright-langserver"
args = ["--stdio"]

[language-server.basedpyright.config]
basedpyright.analysis.diagnosticMode = "openFilesOnly"
basedpyright.autoSearchPaths = false
basedpyright.useLibraryCodeForTypes = false
basedpyright.disableOrganizeImports = true

[language-server.vtsls]
command = "/home/crnvl96/.asdf/installs/nodejs/20.17.0/bin/vtsls"
args = ["--stdio"]

[language-server.vscode-eslint-language-server]
command = "/home/crnvl96/.asdf/installs/nodejs/20.17.0/bin/vscode-eslint-language-server"

# Languages

[[language]]
name = "typescript"
language-servers = ['vtsls', "vscode-eslint-language-server"]
formatter = { command = '/home/crnvl96/.asdf/installs/nodejs/20.17.0/bin/prettierd', args = [
  ".ts",
] }
auto-format = true

[[language]]
name = "python"
language-servers = ["ruff", "basedpyright"]
auto-format = true


[[language]]
name = "toml"
auto-format = true
formatter = { command = "taplo", args = ["fmt", "-"] }
