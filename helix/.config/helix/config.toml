theme = "base16_transparent"

[editor]
line-number = "relative"
mouse = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[keys.normal]
C-s = ":w"
g = { a = "code_action" }
"ret" = ["open_below", "normal_mode"]

[keys.insert]
j = { k = "normal_mode" }
k = { j = "normal_mode" }
C-s = ["normal_mode", ":w"]
