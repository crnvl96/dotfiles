theme = "base16_default_dark"

[editor]
line-number = "relative"
mouse = true
scrolloff = 8

[editor.lsp]
auto-signature-help = false
display-signature-help-docs = false

[editor.indent-guides]
render = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "block"

[editor.file-picker]
hidden = false

[keys.normal]
C-s = ":w"
g = { a = "code_action" }
S-v = ["normal_mode", "goto_line_start", "select_mode", "goto_line_end"]
A-x = "switch_to_lowercase"
'A-S-x' = "switch_to_uppercase"

[keys.select]
A-x = "switch_to_lowercase"
'A-S-x' = "switch_to_uppercase"

[keys.insert]
C-s = ["normal_mode", ":w"]
