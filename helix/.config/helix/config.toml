theme = "base16_transparent"

[editor]
line-number = "relative"
mouse = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[keys.normal]
C-s = ":w"
ret = ["open_below", "normal_mode"]
"C-." = "save_selection"

[keys.normal.space.g]
b = ":sh git -C $(dirname $(realpath %{buffer_name})) blame -L %{cursor_line},%{cursor_line} $(realpath %{buffer_name})"

[keys.insert]
C-s = [":w", "normal_mode"]

[keys.select]
C-s = [":w", "normal_mode"]
