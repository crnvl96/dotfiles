# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

# Change your personal monitor setup in here to keep the main config portable
source = ~/.config/hypr/monitors.conf

# Default applications
$terminal = alacritty
$fileManager = nautilus --new-window
$browser = chromium --new-window --ozone-platform=wayland
$music = spotify
$passwordManager = bitwarden-desktop
$webapp = $browser --app

# Use defaults Dotfiles defaults
source = ~/.local/share/dotfiles/default/hypr/autostart.conf
source = ~/.local/share/dotfiles/default/hypr/bindings.conf
source = ~/.local/share/dotfiles/default/hypr/envs.conf
source = ~/.local/share/dotfiles/default/hypr/looknfeel.conf
# source = ~/.local/share/dotfiles/default/hypr/input.conf
source = ~/.local/share/dotfiles/default/hypr/windows.conf
source = ~/.config/dotfiles/current/theme/hyprland.conf

# Extra env variables
env = GDK_SCALE,1 # Change to 1 if on a 1x display

# Extra env variables needed if running an NVIDIA GPU
env = NVD_BACKEND,direct
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us, us
    kb_variant = basic, intl
    kb_options = grp:win_space_toggle
    kb_model =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe = false
}
