# ────────────────────────────────────────────────────────────
#  Hyprlock — minimal blur with ringed input
# ────────────────────────────────────────────────────────────

general {
    disable_loading_bar = true
    no_fade_in = false
}

background {
    monitor =
    color = rgba(24,22,22,1.0)  # #181616 solid color
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 600, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = rgba(24,22,22,0.8)  # #181616 with opacity
    outer_color = rgba(197,201,197,1.0)  # #c5c9c5
    outline_thickness = 4

    font_family = CaskaydiaMono Nerd Font
    font_size = 32
    font_color = rgba(197,201,197,1.0)

    placeholder_color = rgba(197,201,197,0.6)
    placeholder_text = Enter Password
    check_color = rgba(122,168,159, 1.0)
    fail_text = Wrong

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}
