# Set prefix to C-f
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# Split panes using | and -
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Window management
bind c new-window -c "#{pane_current_path}"
bind x kill-window

# Tmux popup
bind j run-shell '~/.config/tmux/popup.sh'

# Hide status bar by default by changing this to off
set -g status on

# Minimal status bar showing only TMUX indicator and window number
set -g status-left "TMUX [#I]"
set -g status-right ""
set -g status-justify left

# Index based on 1 for easier keyboard access
set -g base-index 1
setw -g pane-base-index 1

# TrueColor support
set -g default-terminal "xterm-256color"
set -sa terminal-overrides ',xterm-256color:RGB'
