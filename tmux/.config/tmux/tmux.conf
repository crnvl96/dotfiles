setw -g mode-keys vi
setw -g pane-base-index 1
setw -g monitor-activity on
setw -g aggressive-resize on

set -g base-index 1
set -g allow-rename on
set -g renumber-windows on
set -g default-terminal "${TERM}"

set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -as terminal-features ",*:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g mouse on
set -g set-titles on
set -g visual-bell off
set -g visual-activity off

set -g focus-events on
set -g detach-on-destroy off
set -s escape-time 0

set-option -g status-left-length 100
set-option -g status-right-length 100
set-option -g status-left " #{session_name}  "
set-option -g status-right " "
set-option -g status-style "fg=#828bb1 bg=default"

set-option -g window-status-format "#{window_index}:#{window_name}#{window_flags} " # window_name -> pane_current_command
set-option -g window-status-current-format "#{window_index}:#{window_name}#{window_flags} "
set-option -g window-status-current-style "fg=#dcc7a0"
set-option -g window-status-activity-style none

# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-/' select-pane -l

# -r means that the bind can repeat without entering prefix again
# -n means that the bind doesn't use the prefix

set -g prefix C-e
bind C-e send-prefix

unbind R
bind R source-file ~/.config/tmux/tmux.conf\; display-message '~/.tmux.conf reloaded'

bind-key r command-prompt -I "#W" "rename-window '%%'"

bind -r n next-window
bind -r p previous-window

bind -n C-Left resize-pane -L 20
bind -n C-Right resize-pane -R 20
bind -n C-Down resize-pane -D 5
bind -n C-Up resize-pane -U 5


bind -n S-Left swap-window -t -1\; select-window -t -1
bind -n S-Right swap-window -t +1\; select-window -t +1
bind -n M-h previous-window
bind -n M-l next-window

bind Space last-window
bind b switch-client -l
bind l select-pane -l

bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"
bind-key o new-window -n lazygit -c "#{pane_current_path}" "lazydocker"
bind-key X command-prompt -p "kill window: " "kill-window -t '%%'"

bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"

bind C-f display-popup -E "\
    tmux list-sessions -F '#{?session_attached,,#{session_name}}' |\
    sed '/^$/d' |\
    fzf --reverse --header jump-to-session |\
    xargs tmux switch-client -t"
