# Set prefix to C-f
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# Split panes using | and -
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Tmux popup
bind -n M-j run-shell '~/.config/tmux/popup.sh'
bind -n M-k run-shell '~/.config/tmux/zoom.sh'

# Hide status bar by default by changing this to off
set -g status on

# Minimal status bar showing only TMUX indicator and window number
set -g status-left "•"
set -g status-right ""
set-option -g window-status-format ""
set-option -g window-status-current-format ""
set-option -g status-style "fg=#7C7D83 bg=default"

# Index based on 1 for easier keyboard access
set -g base-index 1
setw -g pane-base-index 1

# TrueColor support
set -g default-terminal "xterm-256color"
set -sa terminal-overrides ',xterm-256color:RGB'
