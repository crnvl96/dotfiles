vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

set -g mode-keys vi
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g detach-on-destroy off
set -g escape-time 0
set -g allow-passthrough on
set -g visual-activity off
set -g status-justify left
set -g focus-events on
set -g status-left-length 200
set -g status-left " #{session_name}  "
set -g status-right "#(cd '#{pane_current_path}' 2>/dev/null && git rev-parse --abbrev-ref HEAD 2>/dev/null) "
set -s extended-keys on
set -g extended-keys-format csi-u

# -r means that the bind can repeat without entering prefix again
# -n means that the bind doesn't use the prefix

# Send prefix to a nested tmux session by doubling the prefix
set -g prefix C-a
bind C-a send-prefix

unbind ,
bind , source-file ~/.tmux.conf\; display-message '~/.tmux.conf reloaded'

bind -r C-n next-window
bind -r C-p previous-window
bind -r n next-window
bind -r p previous-window

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind -r H resize-pane -L 20
bind -r L resize-pane -R 20
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5

bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

bind y copy-mode

bind R command-prompt -I "#S" "rename-session '%%'"
bind r command-prompt -I "#W" "rename-window '%%'"

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"
bind x kill-pane
