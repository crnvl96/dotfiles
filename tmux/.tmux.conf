# Use Vi mode
setw -g mode-keys vi
# Start window and pane numbering from 1 for easier switching
set -g base-index 1
setw -g pane-base-index 1
# Renumber windows when one is removed.
set -g renumber-windows on
# Allow the mouse to resize windows and select tabs
set -g mouse on
# don't detach tmux when killing a session
set -g detach-on-destroy off
# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Status line customisation
set-option -g status-left-length 200
set-option -g status-left " #{session_name}  "
# add git branch to status line
set-option -g status-style "bg=default"
set -g status-right "#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD) "
set-option -g window-status-format "#{window_index}:#{window_name}#{window_flags} "
set-option -g window-status-current-format "#{window_index}:#{window_name}#{window_flags} "
set-option -g window-status-current-style "fg=#e1a345"
set-option -g window-status-last-style "fg=#936a2e"
set-option -g window-status-activity-style none

# set -g status-justify centre
set -g status-justify left

# -r means that the bind can repeat without entering prefix again
# -n means that the bind doesn't use the prefix

set -g prefix C-a
# Send prefix to a nested tmux session by doubling the prefix
bind C-a send-prefix

# 'PREFIX r' to reload of the config file
unbind r
bind r source-file ~/.tmux.conf\; display-message '~/.tmux.conf reloaded'

# Allow holding Ctrl when using using prefix+p/n for switching windows
bind -n M-h previous-window
bind -n M-l next-window

# Move around panes like in vim
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# resize panes more easily
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5

# bind-key g new-window -n tmux-sessions -c "#{pane_current_path}" "tv tmux-windows"
bind-key w display-popup -w 80% -h 80% -E "tv tmux-windows"
bind-key s display-popup -w 80% -h 80% -E "tv tmux-sessions"

# Rename the current session
bind-key S command-prompt -I "#S" "rename-session '%%'"
# Rename the current window
bind-key W command-prompt -I "#W" "rename-window '%%'"

bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# change the path for newly created windows
bind c new-window -c "#{pane_current_path}"
