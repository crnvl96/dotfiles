# Use Vi mode
setw -g mode-keys vi
# Start window and pane numbering from 1 for easier switching
set -g base-index 1
setw -g pane-base-index 1
# Renumber windows when one is removed.
set -g renumber-windows on
# Allow the mouse to resize windows and select tabs
set -g mouse on
# don't detach tmux when killing a session
set -g detach-on-destroy off
# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

set -gq allow-passthrough on
set -g visual-activity off
set-option -g focus-events on

# Status line customisation
set-option -g status-left-length 200
set-option -g status-left " #{session_name}  "
set -g status-right "#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD) "

# set -g status-justify centre
set -g status-justify left

# -r means that the bind can repeat without entering prefix again
# -n means that the bind doesn't use the prefix

set -g prefix C-a
# Send prefix to a nested tmux session by doubling the prefix
bind C-a send-prefix

# 'PREFIX ,' to reload of the config file
unbind ,
bind , source-file ~/.tmux.conf\; display-message '~/.tmux.conf reloaded'

# Allow holding Ctrl when using using prefix+p/n for switching windows
bind -r C-n next-window
bind -r C-p previous-window

vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# resize panes more easily
bind -r H resize-pane -L 20
bind -r L resize-pane -R 20
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5

bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"
bind-key f display-popup -w 80% -h 80% -E "tv tmux-windows"
bind-key F display-popup -w 80% -h 80% -E "tv tmux-sessions"

# Rename the current session
bind-key R command-prompt -I "#S" "rename-session '%%'"
# Rename the current window
bind-key r command-prompt -I "#W" "rename-window '%%'"

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# change the path for newly created windows
bind c new-window -c "#{pane_current_path}"
